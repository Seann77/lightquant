        - generic [ref=e177]:
          - heading [level=1] [ref=e178]:
            - text: 使用说明
            - link "Permalink to \"使用说明\"" [ref=e179] [cursor=pointer]:
              - /url: "#使用说明"
              - text: "#"
          - heading [level=2] [ref=e180]:
            - text: 新建策略
            - link "Permalink to \"新建策略\"" [ref=e181] [cursor=pointer]:
              - /url: "#新建策略"
              - text: "#"
          - paragraph [ref=e182]: 开始回测和交易前需要先新建策略，点击下图中左上角标识进行策略添加。可以选择不同的业务类型（比如股票），然后给策略设定一个名称，添加成功后可以在默认策略模板基础上进行策略编写。
          - paragraph [ref=e183]
          - heading [level=2] [ref=e184]:
            - text: 新建回测
            - link "Permalink to \"新建回测\"" [ref=e185] [cursor=pointer]:
              - /url: "#新建回测"
              - text: "#"
          - paragraph [ref=e186]: 策略添加完成后就可以开始进行回测操作了。回测之前需要对开始时间、结束时间、回测资金、回测基准、回测频率几个要素进行设定，设定完毕后点击保存。然后再点击回测按键，系统就会开始运行回测，回测的评价指标、收益曲线、日志都会在界面中展现。
          - paragraph [ref=e187]
          - heading [level=2] [ref=e188]:
            - text: 新建交易
            - link "Permalink to \"新建交易\"" [ref=e189] [cursor=pointer]:
              - /url: "#新建交易"
              - text: "#"
          - paragraph [ref=e190]: 交易界面点击新增按键进行新增交易操作，策略方案中的对象为所有策略列表中的策略，给本次交易设定名称并点击确定后系统就开始运行交易了。
          - paragraph [ref=e191]
          - paragraph [ref=e192]:
            - text: 交易开始运行后，可以实时看到总资产和可用资金情况，同时可以在交易列表查询
            - link "交易状态" [ref=e193] [cursor=pointer]:
              - /url: /qthelp/help/engine.html#trade_status
            - text: 。
          - paragraph [ref=e194]
          - paragraph [ref=e195]: 交易开始运行后，可以点击交易详情，查看策略评价指标、交易明细、持仓明细、交易日志。
          - paragraph [ref=e196]
          - heading [level=2] [ref=e197]:
            - text: 策略运行周期
            - link "Permalink to \"策略运行周期\"" [ref=e198] [cursor=pointer]:
              - /url: "#策略运行周期"
              - text: "#"
          - paragraph [ref=e199]:
            - text: 回测支持日线级别、分钟级别运行，详见
            - link "handle_data" [ref=e200] [cursor=pointer]:
              - /url: /qthelp/help/engine.html#handle_data
            - text: 方法。
          - paragraph [ref=e201]:
            - text: 交易支持日线级别、分钟级别、tick 级别运行，日线级别和分钟级别详见
            - link "handle_data" [ref=e202] [cursor=pointer]:
              - /url: /qthelp/help/engine.html#handle_data
            - text: 方法，tick 级别运行详见
            - link "run_interval" [ref=e203] [cursor=pointer]:
              - /url: /qthelp/api/system.html#run_interval
            - text: 和
            - link "tick_data" [ref=e204] [cursor=pointer]:
              - /url: /qthelp/help/engine.html#tick_data
            - text: 方法。
          - paragraph [ref=e205]: 频率：日线级别
          - paragraph [ref=e206]:
            - text: 当选择日线频率时，回测和交易都是每天运行一次，运行时间详见
            - link "handle_data" [ref=e207] [cursor=pointer]:
              - /url: /qthelp/help/engine.html#handle_data
            - text: 方法。
          - paragraph [ref=e208]: 频率：分钟级别
          - paragraph [ref=e209]: 当选择分钟频率时，回测和交易都是每分钟运行一次，运行时间为每根分钟 K 线结束。
          - paragraph [ref=e210]: 频率：tick 级别
          - paragraph [ref=e211]: 当选择 tick 频率时，交易最小频率可以达到 3 秒运行一次。
          - heading [level=2] [ref=e212]:
            - text: 策略运行时间
            - link "Permalink to \"策略运行时间\"" [ref=e213] [cursor=pointer]:
              - /url: "#策略运行时间"
              - text: "#"
          - paragraph [ref=e214]: "盘前运行:"
          - paragraph [ref=e215]:
            - text: 9:30 分钟之前为盘前运行时间，交易环境支持运行在
            - link "run_daily" [ref=e216] [cursor=pointer]:
              - /url: /qthelp/api/system.html#run_daily
            - text: 中指定交易时间(如 time='09:15')运行的函数；回测环境和交易环境支持运行
            - link "before_trading_start" [ref=e217] [cursor=pointer]:
              - /url: /qthelp/help/engine.html#before_trading_start
            - text: 函数
          - paragraph [ref=e218]: "盘中运行:"
          - paragraph [ref=e219]:
            - text: 9:31(股票回测)/9:30(股票交易)~15:00(股票回测)/14:59(股票交易)、9:30(港股通交易)~16:09(港股通交易)分为盘中运行时间，分钟级别回测环境和交易环境支持运行在
            - link "run_daily" [ref=e220] [cursor=pointer]:
              - /url: /qthelp/api/system.html#run_daily
            - text: 中指定交易时间(如 time='14:30')运行的函数；回测环境和交易环境支持运行
            - link "handle_data" [ref=e221] [cursor=pointer]:
              - /url: /qthelp/help/engine.html#handle_data
            - text: 函数；交易环境支持运行
            - link "run_interval" [ref=e222] [cursor=pointer]:
              - /url: /qthelp/api/system.html#run_interval
            - text: 函数
          - paragraph [ref=e223]: "盘后运行:"
          - paragraph [ref=e224]:
            - text: 15:30(股票)/16:30(港股通)分为盘后运行时间，回测环境和交易环境支持运行
            - link "after_trading_end" [ref=e225] [cursor=pointer]:
              - /url: /qthelp/help/engine.html#after_trading_end
            - text: 函数(该函数为定时运行)；15:00(股票)/16:10(港股通)之后交易环境支持运行在
            - link "run_daily" [ref=e226] [cursor=pointer]:
              - /url: /qthelp/api/system.html#run_daily
            - text: 中指定交易时间(如 time='15:10')运行的函数，
          - heading [level=2] [ref=e227]:
            - text: 交易策略委托下单时间
            - link "Permalink to \"交易策略委托下单时间\"" [ref=e228] [cursor=pointer]:
              - /url: "#交易策略委托下单时间"
              - text: "#"
          - paragraph [ref=e229]: 使用 order 系列接口进行股票委托下单，将直接报单到柜台。
