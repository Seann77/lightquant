<body class="bg-background font-body-md text-on-surface antialiased overflow-hidden">
<!-- Base Homepage Content (Blurred/Background) -->
<div class="h-screen w-full flex flex-col relative filter blur-sm pointer-events-none opacity-50">
<!-- TopNavBar Structure -->
<nav class="bg-paper border-b border-steel flex justify-between items-center h-16 px-xl w-full z-50">
<div class="font-display-sm text-display-sm font-bold text-primary">
                LightQuant (轻量化)
            </div>
<div class="hidden md:flex gap-md">
<a class="text-on-surface-variant font-body-md hover:text-primary-bright transition-colors px-md py-sm" href="#">积分充值</a>
<a class="text-on-surface-variant font-body-md hover:text-primary-bright transition-colors px-md py-sm" href="#">加入微信群</a>
</div>
<div class="flex items-center gap-sm">
<button class="text-primary font-button-md text-button-md hover:text-primary-bright transition-colors">登录 / 注册</button>
</div>
</nav>
<!-- Dummy Hero Section for background visual -->
<main class="flex-grow flex flex-col items-center justify-center p-xl gap-section">
<div class="text-center max-w-3xl">
<h1 class="font-display-xl text-display-xl text-on-background mb-lg">Welcome to LightQuant</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">A sophisticated blend of consumer-electronics catalog clarity and robust enterprise-software reliability.</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-xl w-full max-w-6xl">
<div class="bg-paper p-xl rounded-lg border border-steel h-64"></div>
<div class="bg-paper p-xl rounded-lg border border-steel h-64"></div>
<div class="bg-paper p-xl rounded-lg border border-steel h-64"></div>
</div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-ink/60 z-[100] flex items-center justify-center p-md">
<!-- Modal Container -->
<div class="bg-paper rounded-[16px] w-full max-w-[400px] p-xl relative shadow-2xl flex flex-col gap-xl border border-steel">
<!-- Close Button -->
<button aria-label="Close modal" class="absolute top-md right-md text-on-surface-variant hover:text-primary transition-colors p-xs rounded-full hover:bg-fog">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<!-- Header -->
<div class="flex flex-col gap-xs mt-sm">
<h2 class="font-display-md text-display-md text-on-background font-semibold">登录 / 注册</h2>
<p class="font-caption-md text-caption-md text-primary-bright flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]" data-icon="featured_play_list">featured_play_list</span>
                    注册即送 500 积分
                </p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<!-- Phone Input -->
<div class="flex flex-col gap-xxs">
<label class="font-caption-bold text-caption-bold text-on-surface" for="phone">手机号</label>
<input class="h-[44px] rounded border border-steel px-sm font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder-on-surface-variant/50 transition-colors" id="phone" placeholder="请输入手机号" type="tel">
</div>
<!-- SMS Code Input -->
<div class="flex flex-col gap-xxs">
<label class="font-caption-bold text-caption-bold text-on-surface" for="sms_code">验证码</label>
<div class="flex gap-sm">
<input class="h-[44px] flex-grow rounded border border-steel px-sm font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder-on-surface-variant/50 transition-colors" id="sms_code" placeholder="输入验证码" type="text">
<button class="h-[44px] px-md border border-primary text-primary rounded font-button-md text-button-md hover:bg-primary-soft transition-colors whitespace-nowrap" type="button">获取验证码</button>
</div>
</div>
<!-- Invite Code Input -->
<div class="flex flex-col gap-xxs mt-xs">
<label class="font-caption-bold text-caption-bold text-on-surface flex items-center gap-xs" for="invite_code">
                        邀请码 <span class="font-caption-sm text-caption-sm text-on-surface-variant font-normal">(选填)</span>
</label>
<input class="h-[44px] rounded border border-steel px-sm font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder-on-surface-variant/50 transition-colors bg-cloud" id="invite_code" placeholder="如有邀请码请填写" type="text">
</div>
<!-- Primary CTA -->
<button class="h-[44px] w-full bg-primary-bright text-on-primary rounded font-button-md text-button-md mt-sm hover:bg-primary transition-colors flex items-center justify-center gap-xs" type="submit">
                    登录/注册
                </button>
</form>
<!-- Referral Promo -->
<div class="mt-xs pt-md border-t border-fog flex items-center justify-between bg-cloud p-sm rounded border border-steel/50">
<span class="font-caption-md text-caption-md text-on-surface-variant">复制邀请链接，邀请 1 人奖励 200 积分</span>
<button aria-label="Copy referral link" class="text-primary hover:text-primary-deep transition-colors p-xs" onclick="alert('链接已复制')">
<span class="material-symbols-outlined text-[20px]" data-icon="content_copy">content_copy</span>
</button>
</div>
</div>
</div>
</body></html>
